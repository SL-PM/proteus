# PROTEUS server config (v0.3 prototype)
# Placeholder for M0. Schema lands in M1.

listen:
  addr: "0.0.0.0:4433"

# Optional. PEM cert chain + private key (PKCS#8/PKCS#1/SEC1) loaded
# from disk. If commented out, the server generates a fresh self-
# signed cert (SAN `localhost`) on startup — convenient for local
# dev only, NOT for any real deployment. Lands in v0.4 M4.4.
# tls:
#   cert: "/etc/proteus/server-cert.pem"
#   key:  "/etc/proteus/server-key.pem"

clients:
  # client_id -> base64 ed25519 public key
  # Populated by `proteus-tools keygen` (M2).

policy:
  block_private_ranges: true
  allowed_ports: [80, 443, 8080]
  allow_udp: false

decoy:
  static_page: "configs/decoy.html"
